<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>FloraScan — AI Plant Disease Detector</title>
    <meta name="description"
        content="Identify plant diseases instantly with AI-powered leaf scanning. Get treatment solutions, care tips, and track your garden's health." />

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />

    <!-- Styles -->
    <link href="styles.css" rel="stylesheet" />
</head>

<body>
    <!-- Top App Bar -->
    <header class="top-bar" id="top-bar">
        <div class="top-bar__left">
            <span class="material-symbols-outlined top-bar__icon" id="menu-btn">menu</span>
            <h1 class="top-bar__title">FloraScan</h1>
        </div>
        <div class="top-bar__avatar">
            <img alt="User profile"
                src="https://thumbs.dreamstime.com/b/default-avatar-profile-image-vector-social-media-user-icon-potrait-182347582.jpg" />
        </div>
    </header>

    <!-- Main content area — pages render here -->
    <main id="app" class="app-content"></main>

    <!-- Bottom Navigation Bar -->
    <nav class="bottom-nav" id="bottom-nav">
        <a href="#home" class="bottom-nav__item" data-page="home" id="nav-home">
            <span class="material-symbols-outlined">home</span>
            <span class="bottom-nav__label">Home</span>
        </a>
        <a href="#scan" class="bottom-nav__item" data-page="scan" id="nav-scan">
            <span class="material-symbols-outlined">photo_camera</span>
            <span class="bottom-nav__label">Scan</span>
        </a>
        <a href="#history" class="bottom-nav__item" data-page="history" id="nav-history">
            <span class="material-symbols-outlined">history</span>
            <span class="bottom-nav__label">History</span>
        </a>
        <a href="#tips" class="bottom-nav__item" data-page="tips" id="nav-tips">
            <span class="material-symbols-outlined">lightbulb</span>
            <span class="bottom-nav__label">Tips</span>
        </a>
    </nav>

    <!-- Page modules -->
    <script src="pages/home.js"></script>
    <script src="pages/scan.js"></script>
    <script src="pages/result.js"></script>
    <script src="pages/history.js"></script>
    <script src="pages/tips.js"></script>
    <script src="app.js"></script>
</body>

</html>
